<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
    margin: 0;
    background: #111;
}

.banner {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

.banner .slider {
    position: absolute;
    width: 340px;
    height: 220px;
    top: 20%;
    left: calc(50% - 170px);
    transform-style: preserve-3d;
    transform: perspective(1000px);
    animation: autoRun 20s linear infinite;
    background-color: red;
}

.banner .slider .item {
    position: absolute;
    width: 180px;
    height: 220px;
    transform:
        rotateY(calc((var(--position) - 1) * (360deg / var(--quantity))))
        translateZ(450px);
        background-color: green;
}

.banner .slider .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Animation */
@keyframes autoRun {
    from {
        transform: perspective(1000px) rotateX(-16deg) rotateY(0deg);
    }
    to {
        transform: perspective(1000px) rotateX(-16deg) rotateY(360deg);
    }
}
</style>
<body>

<div class="banner">
    <div class="slider" style="--quantity: 10">
        
        <div class="item" style="--position: 1">
            <img src="images/dragon_1.jpg" alt="">
        </div>

        <div class="item" style="--position: 2">
            <img src="images/dragon_2.jpg" alt="">
        </div>

        <div class="item" style="--position: 3">
            <img src="images/dragon_3.jpg" alt="">
        </div>

        <div class="item" style="--position: 4">
            <img src="images/dragon_4.jpg" alt="">
        </div>

        <div class="item" style="--position: 5">
            <img src="images/dragon_5.jpg" alt="">
        </div>

        <div class="item" style="--position: 6">
            <img src="images/dragon_6.jpg" alt="">
        </div>

        <div class="item" style="--position: 7">
            <img src="images/dragon_7.jpg" alt="">
        </div>

        <div class="item" style="--position: 8">
            <img src="images/dragon_8.jpg" alt="">
        </div>

        <div class="item" style="--position: 9">
            <img src="images/dragon_9.jpg" alt="">
        </div>

        <div class="item" style="--position: 10">
            <img src="images/dragon_10.jpg" alt="">
        </div>

    </div>
</div>

</body>
</html>
