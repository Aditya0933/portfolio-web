<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Circular Carousel | Whole Carousel Rotates 360°</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 20%, #050b17, #010101);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1300px;
            perspective-origin: 50% 50%;
            background: radial-gradient(ellipse at center, rgba(10, 20, 45, 0.6) 0%, #000000 90%);
            overflow: hidden;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .card {
            position: absolute;
            width: 240px;
            height: 320px;
            left: 50%;
            top: 50%;
            margin-left: -120px;
            margin-top: -160px;
            background: rgba(20, 30, 55, 0.88);
            backdrop-filter: blur(5px);
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(80, 150, 255, 0.3);
            transition: box-shadow 0.2s, border-color 0.2s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.2rem;
            cursor: pointer;
            will-change: transform;
            backface-visibility: visible;
        }

        .card:hover {
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 25px rgba(100, 150, 255, 0.5);
            border-color: rgba(100, 180, 255, 0.8);
        }

        .card-icon {
            font-size: 3.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffe6b0, #6ea8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #bbd4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card-desc {
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.85;
            line-height: 1.4;
            padding: 0 0.5rem;
            color: #cddcff;
        }

        .card-badge {
            position: absolute;
            bottom: 16px;
            right: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 40px;
            color: #aac4ff;
        }

        .controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            border: 1px solid rgba(100, 150, 255, 0.4);
            font-family: monospace;
            font-size: 0.9rem;
            color: #ccdeff;
        }

        .controls button {
            background: rgba(50, 100, 200, 0.5);
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .controls button:hover {
            background: rgba(80, 140, 255, 0.9);
            transform: scale(1.02);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        @media (max-width: 750px) {
            .card {
                width: 200px;
                height: 270px;
                margin-left: -100px;
                margin-top: -135px;
            }
            .card-icon {
                font-size: 3rem;
            }
            .card-title {
                font-size: 1.3rem;
            }
            .card-desc {
                font-size: 0.7rem;
            }
            .controls {
                font-size: 0.7rem;
                padding: 6px 16px;
            }
            .controls button {
                padding: 4px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="scene">
    <div class="carousel" id="carousel"></div>
</div>

<div class="controls">
    <span class="status"><i class="fas fa-arrow-left"></i> Carousel 360° Auto-Rotate (Right → Left)</span>
    <button id="pauseBtn">⏸️ Pause</button>
    <button id="playBtn">▶️ Play</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
    // Card data (8 cards for a full circle)
    const cardsData = [
        { icon: "fas fa-saturn", title: "COSMIC RIM", desc: "Circular 3D arrangement", badge: "01" },
        { icon: "fas fa-hand-sparkles", title: "AURA SHIFT", desc: "Whole carousel rotates", badge: "02" },
        { icon: "fas fa-waveform", title: "CURVE WARP", desc: "No individual card spin", badge: "03" },
        { icon: "fas fa-compass", title: "ORBIT CORE", desc: "Smooth 360° motion", badge: "04" },
        { icon: "fas fa-dharmachakra", title: "INFINITY RING", desc: "Cylindrical layout", badge: "05" },
        { icon: "fas fa-meteor", title: "STELLAR DRIFT", desc: "Continuous rotation", badge: "06" },
        { icon: "fas fa-crown", title: "MAJESTIC ARC", desc: "3D perspective", badge: "07" },
        { icon: "fas fa-gem", title: "PRISM VORTEX", desc: "Curved scroller effect", badge: "08" }
    ];

    const carousel = document.getElementById('carousel');
    let cards = [];
    let radius = 380;           // circle radius
    let currentRotation = 0;    // degrees
    let autoRotateAnim = null;
    let isPlaying = true;

    // Responsive radius based on screen width
    function getRadius() {
        const w = window.innerWidth;
        if (w < 600) return 260;
        if (w < 900) return 330;
        return 400;
    }

    // Build the circular arrangement: each card gets rotateY(angle) + translateZ(radius)
    function buildCarousel() {
        carousel.innerHTML = '';
        cards = [];
        const total = cardsData.length;
        const angleStep = (360 / total) * (Math.PI / 180); // radians

        cardsData.forEach((data, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-icon"><i class="${data.icon}"></i></div>
                <div class="card-title">${data.title}</div>
                <div class="card-desc">${data.desc}</div>
                <div class="card-badge">${data.badge}</div>
            `;
            const angleRad = idx * angleStep;
            card.dataset.angle = angleRad;
            carousel.appendChild(card);
            cards.push(card);
        });
        updatePositions();
    }

    // Apply transforms to each card (fixed orientation – no individual spin)
    function updatePositions() {
        cards.forEach(card => {
            const angleRad = parseFloat(card.dataset.angle);
            card.style.transform = `rotateY(${angleRad}rad) translateZ(${radius}px)`;
        });
    }

    // Optional: dynamic scaling (cards at sides appear larger, center smaller)
    // This enhances the 3D curved look. Remove if you want all cards same size.
    function updateScaling() {
        const rotationRad = currentRotation * (Math.PI / 180);
        cards.forEach(card => {
            const cardAngleRad = parseFloat(card.dataset.angle);
            let relative = cardAngleRad - rotationRad;
            relative = Math.atan2(Math.sin(relative), Math.cos(relative));
            const strength = 0.75;
            const sinSq = Math.sin(relative) ** 2;
            let scale = 1 + (strength * sinSq);
            scale = Math.min(1.8, Math.max(0.85, scale));
            gsap.set(card, { scale: scale, force3D: true });
        });
    }

    // Z-index sorting for proper layering (cards in front get higher z-index)
    function updateZIndex() {
        const rotationRad = currentRotation * (Math.PI / 180);
        const depths = cards.map(card => {
            const cardAngle = parseFloat(card.dataset.angle);
            const worldAngle = cardAngle - rotationRad;
            const z = radius * Math.cos(worldAngle);
            return { card, z };
        });
        depths.sort((a, b) => b.z - a.z);
        depths.forEach((item, idx) => {
            item.card.style.zIndex = 1000 - idx;
        });
    }

    // Auto-rotate the entire carousel (right → left direction = decreasing rotationY)
    function startAutoRotate() {
        if (autoRotateAnim) autoRotateAnim.kill();
        autoRotateAnim = gsap.to(carousel, {
            rotationY: currentRotation - 360,
            duration: 12,           // 12 seconds per full circle
            ease: "none",
            repeat: -1,
            modifiers: {
                rotationY: (x) => {
                    let val = parseFloat(x);
                    val = ((val % 360) + 360) % 360;
                    return val;
                }
            },
            onUpdate: () => {
                currentRotation = gsap.getProperty(carousel, "rotationY");
                if (isNaN(currentRotation)) currentRotation = 0;
                updateScaling();
                updateZIndex();
            },
            onRepeat: () => {
                currentRotation = gsap.getProperty(carousel, "rotationY");
                updateScaling();
                updateZIndex();
            }
        });
    }

    function pauseRotation() {
        if (autoRotateAnim) {
            autoRotateAnim.pause();
            isPlaying = false;
        }
    }

    function resumeRotation() {
        if (autoRotateAnim) {
            autoRotateAnim.resume();
            isPlaying = true;
        } else {
            startAutoRotate();
            isPlaying = true;
        }
    }

    // Handle window resize
    function handleResize() {
        const newRadius = getRadius();
        if (newRadius !== radius) {
            radius = newRadius;
            updatePositions();
            const scene = document.querySelector('.scene');
            if (scene) scene.style.perspective = `${Math.min(1400, radius * 3.2)}px`;
            updateScaling();
            updateZIndex();
        }
    }

    // Initialize
    function init() {
        radius = getRadius();
        buildCarousel();

        const scene = document.querySelector('.scene');
        scene.style.perspective = `${Math.min(1400, radius * 3.2)}px`;

        startAutoRotate();

        // Optional hover lift effect (does not affect rotation)
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                gsap.to(card, { z: 30, duration: 0.25, ease: "power2.out" });
            });
            card.addEventListener('mouseleave', () => {
                gsap.to(card, { z: 0, duration: 0.4, ease: "elastic.out(1, 0.4)" });
            });
        });

        document.getElementById('pauseBtn').addEventListener('click', pauseRotation);
        document.getElementById('playBtn').addEventListener('click', resumeRotation);
        window.addEventListener('resize', () => setTimeout(handleResize, 100));

        updateScaling();
        updateZIndex();
    }

    init();
</script>
</body>
</html>
