<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slider Drag X + Y</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GSAP + Draggable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

    <!-- Momentum Effect -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/InertiaPlugin.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            overflow: hidden;
        }

        .banner {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        .slider {
            width: 200px;
            height: 260px;
            position: relative;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .item {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="container-fluid banner">
        <div class="slider" id="slider"></div>
    </div>

    <script>
        const slider = document.getElementById("slider");
        const total = 10;
        const radius = 500;

        // Create items
        for (let i = 0; i < total; i++) {
            const item = document.createElement("div");
            item.className = "item";

            const img = document.createElement("img");
            img.src = `https://picsum.photos/id/${20 + i}/500/600`;

            item.appendChild(img);
            slider.appendChild(item);

            const angle = (360 / total) * i;

            gsap.set(item, {
                rotationY: angle,
                transformOrigin: `50% 50% ${-radius}px`,
                z: radius
            });
        }

        // Initial tilt
        let rotX = -10;
        let rotY = 0;

        gsap.set(slider, {
            rotationX: rotX,
            rotationY: rotY
        });

        // Auto rotate
        let auto = gsap.to(slider, {
            rotationY: "+=360",
            duration: 20,
            repeat: -1,
            ease: "linear"
        });

        // Drag control
        Draggable.create(slider, {
            type: "x,y",
            inertia: true,
            onPress() {
                auto.pause();
                slider.style.cursor = "grabbing";
            },
            onRelease() {
                auto.resume();
                slider.style.cursor = "grab";
            },
            onDragStart() {
                this.startX = rotY;
                this.startY = rotX;
            },
            onDrag() {
                rotY = this.startX + this.x * 0.3;
                rotX = this.startY - this.y * 0.3;

                // Limit vertical tilt
                rotX = Math.max(-45, Math.min(45, rotX));

                gsap.set(slider, {
                    rotationY: rotY,
                    rotationX: rotX
                });
            }
        });
    </script>

</body>

</html>
